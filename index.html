<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<base href="https://cdn.jsdelivr.net/gh/wasm-rip/PlagueIncEvolved/">
<title>Plague Inc</title>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: black;
}

#unity-canvas {
  width: 100vw;
  height: 100vh;
  display: block;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #0b0b0b;
  color: white;
  font-family: sans-serif;
}

#bar {
  width: 60%;
  height: 12px;
  background: #333;
}

#fill {
  height: 100%;
  width: 0%;
  background: #4caf50;
}
</style>
</head>

<body>

<div id="loader">
  <div id="text">0 MB / ? MB</div>
  <div id="bar"><div id="fill"></div></div>
</div>

<canvas id="unity-canvas"></canvas>

<script src="Build/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js"></script>

<script>
const baseBuild = "https://cdn.jsdelivr.net/gh/wasm-rip/PlagueIncEvolved/Build/"
const base = "https://cdn.jsdelivr.net/gh/wasm-rip/PlagueIncEvolved/"

let loaded = 0
let totalGuess = 317 * 1024 * 1024

function update() {
  const mb = (loaded / 1024 / 1024).toFixed(1)
  const total = (totalGuess / 1024 / 1024).toFixed(0)
  document.getElementById("text").textContent = mb + " MB / " + total + " MB"
  document.getElementById("fill").style.width = (loaded / totalGuess * 100) + "%"
}

async function fetchPart(file, i) {
  const url = baseBuild + file + ".part" + String(i).padStart(2, "0")
  const res = await fetch(url)
  if (!res.ok) return null

  const buf = await res.arrayBuffer()
  loaded += buf.byteLength
  update()
  return new Uint8Array(buf)
}

async function loadFile(file) {
  const first = await fetchPart(file, 0)
  if (!first) return null

  const parts = [first]

  for (let i = 1; ; i++) {
    const p = await fetchPart(file, i)
    if (!p) break
    parts.push(p)
  }

  let size = 0
  for (const p of parts) size += p.length

  const out = new Uint8Array(size)
  let off = 0

  for (const p of parts) {
    out.set(p, off)
    off += p.length
  }

  return out.buffer
}

async function start() {
  const wasm = await loadFile("1605eb800a276784e4a31d7e08c292ca.wasm")
  const data = await loadFile("c68552511e0497caf31a2ee65f4f53e3.data")

  const wasmUrl = URL.createObjectURL(new Blob([wasm], { type: "application/wasm" }))
  const dataUrl = URL.createObjectURL(new Blob([data]))

  document.getElementById("loader").style.display = "none"

  createUnityInstance(document.querySelector("#unity-canvas"), {
    dataUrl: dataUrl,
    frameworkUrl: baseBuild + "34cbf55c105d3d6cb061777c1afc3ae2.framework.js",
    codeUrl: wasmUrl,
    streamingAssetsUrl: base + "StreamingAssets",
    companyName: "Ndemic Creations",
    productName: "Plague Inc",
    productVersion: "1.18.3.2"
  })
}

start()
</script>

</body>
</html>
